# GitHub Actions: 构建并推送 gemini-proxy 到 Docker Hub
name: Build and Push to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gemini-proxy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gemini-proxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
